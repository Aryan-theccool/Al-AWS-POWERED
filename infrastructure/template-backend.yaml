AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'ClarityBridge AI Marketplace - Backend Only'

Parameters:
  Environment:
    Type: String
    Default: dev
  OpenAIApiKey:
    Type: String
    NoEcho: true
  StripeSecretKey:
    Type: String
    NoEcho: true
  FrontendDomain:
    Type: String
    Default: dtrv0ugj9rfe0.cloudfront.net

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE_NAME: !Ref ClarityBridgeTable
        COGNITO_USER_POOL_ID: !Ref ClarityBridgeUserPool
        COGNITO_CLIENT_ID: !Ref ClarityBridgeWebClient
        OPENAI_API_KEY: !Ref OpenAIApiKey
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        FRONTEND_URL: !Sub 'https://${FrontendDomain}'
    Layers:
      - !Ref ClarityBridgeLayer

Resources:
  # DynamoDB Table
  ClarityBridgeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'ClarityBridge-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # S3 Bucket for File Uploads
  ClarityBridgeUploads:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'claritybridge-uploads-${AWS::AccountId}-${Environment}'
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins:
              - !Sub 'https://${FrontendDomain}'
              - 'http://localhost:5173'
            MaxAge: 3000

  # Cognito User Pool
  ClarityBridgeUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'ClarityBridge-${Environment}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: given_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: family_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: user_type
          AttributeDataType: String
          Required: false
          Mutable: true
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT

  # Cognito User Pool Client
  ClarityBridgeWebClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'ClarityBridge-Web-${Environment}'
      UserPoolId: !Ref ClarityBridgeUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO

  # Lambda Layer for Shared Dependencies
  ClarityBridgeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub 'ClarityBridge-Dependencies-${Environment}'
      Description: Shared dependencies for ClarityBridge Lambda functions
      ContentUri: ../backend/layer/
      CompatibleRuntimes:
        - nodejs18.x
        - nodejs20.x
      RetentionPolicy: Delete

  # HTTP API Gateway
  ClarityBridgeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'https://${FrontendDomain}'
          - 'http://localhost:5173'
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 600
        AllowCredentials: false
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${ClarityBridgeUserPool}'
              audience:
                - !Ref ClarityBridgeWebClient
        DefaultAuthorizer: CognitoAuthorizer

  # Lambda Functions
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetProfile-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/getProfile.handler
      Events:
        GetProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /profile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-UpdateProfile-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/updateProfile.handler
      Events:
        UpdateProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: PUT
            Path: /profile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  CreateProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-CreateProject-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/createProject.handler
      Events:
        CreateProject:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /projects
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  UpdateProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-UpdateProject-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/updateProject.handler
      Events:
        UpdateProject:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: PUT
            Path: /projects/{projectId}
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  ListProjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-ListProjects-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/listProjects.handler
      Events:
        ListProjects:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /projects
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  GetProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetProject-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/getProject.handler
      Events:
        GetProject:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /projects/{projectId}
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  ListActiveProjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-ListActiveProjects-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/listActiveProjects.handler
      Events:
        ListActiveProjects:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /marketplace/projects
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  CreateProposalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-CreateProposal-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/createProposal.handler
      Events:
        CreateProposal:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /projects/{projectId}/proposals
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  SendMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-SendMessage-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/sendMessage.handler
      Events:
        SendMessage:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /projects/{projectId}/messages
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  GetMessagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetMessages-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/getMessages.handler
      Events:
        GetMessages:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /projects/{projectId}/messages
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  GetProposalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetProposals-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/getProposals.handler
      Events:
        GetProposals:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /projects/{projectId}/proposals
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  GetPresignedUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetPresignedUploadUrl-${Environment}'
      CodeUri: ../backend/dist/
      Handler: handlers/getPresignedUploadUrl.handler
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref ClarityBridgeUploads
      Events:
        GetPresignedUploadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /upload-url
            Auth:
              Authorizer: NONE
      Policies:
        - S3WritePolicy:
            BucketName: !Ref ClarityBridgeUploads

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ClarityBridgeApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref ClarityBridgeUserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref ClarityBridgeWebClient

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref ClarityBridgeTable

  UploadsBucketName:
    Description: S3 uploads bucket name
    Value: !Ref ClarityBridgeUploads

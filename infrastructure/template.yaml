AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'ClarityBridge AI Marketplace - Serverless Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name
  
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: OpenAI API Key for AI analysis
  
  StripeSecretKey:
    Type: String
    NoEcho: true
    Description: Stripe Secret Key for payment processing
  
  FrontendDomain:
    Type: String
    Default: localhost:5173
    Description: Frontend domain for CORS configuration

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs20.x
    MemorySize: 512
    Environment:
      Variables:
        DYNAMODB_TABLE_NAME: !Ref ClarityBridgeTable
        COGNITO_USER_POOL_ID: !Ref ClarityBridgeUserPool
        COGNITO_CLIENT_ID: !Ref ClarityBridgeWebClient
        OPENAI_API_KEY: !Ref OpenAIApiKey
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        FRONTEND_URL: !Sub 'https://${FrontendDomain}'
    Layers:
      - !Ref ClarityBridgeLayer

Resources:
  # DynamoDB Table
  ClarityBridgeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'ClarityBridge-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ClarityBridge

  # S3 Bucket for File Uploads
  ClarityBridgeUploads:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'claritybridge-uploads-${AWS::AccountId}-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: 
              - !Sub 'https://${FrontendDomain}'
              - 'http://localhost:5173'
            MaxAge: 3000
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ClarityBridge

  # S3 Bucket for Frontend Hosting
  ClarityBridgeFrontend:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'claritybridge-frontend-${AWS::AccountId}-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ClarityBridge

  # CloudFront Origin Access Control
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'ClarityBridge-OAC-${Environment}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ClarityBridgeFrontend.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ClarityBridge

  # S3 Bucket Policy for CloudFront
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ClarityBridgeFrontend
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${ClarityBridgeFrontend}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # Cognito User Pool
  ClarityBridgeUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'ClarityBridge-${Environment}'
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: given_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: family_name
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: user_type
          AttributeDataType: String
          Required: false
          Mutable: true
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      UserPoolTags:
        Environment: !Ref Environment
        Application: ClarityBridge

  # Cognito User Pool Client
  ClarityBridgeWebClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub 'ClarityBridge-Web-${Environment}'
      UserPoolId: !Ref ClarityBridgeUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub 'https://${FrontendDomain}'
        - 'http://localhost:5173'
      LogoutURLs:
        - !Sub 'https://${FrontendDomain}'
        - 'http://localhost:5173'
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true

  # Lambda Layer for Shared Dependencies
  ClarityBridgeLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub 'ClarityBridge-Dependencies-${Environment}'
      Description: Shared dependencies for ClarityBridge Lambda functions
      ContentUri: ../backend/layer/
      CompatibleRuntimes:
        - nodejs18.x
        - nodejs20.x
      RetentionPolicy: Delete

  # HTTP API Gateway
  ClarityBridgeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'https://${FrontendDomain}'
          - 'http://localhost:5173'
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 600
        AllowCredentials: true
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${ClarityBridgeUserPool}'
              audience:
                - !Ref ClarityBridgeWebClient
        DefaultAuthorizer: CognitoAuthorizer

  # Lambda Functions
  
  # Authentication Functions
  GetProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetProfile-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: getProfile.handler
      Events:
        GetProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /profile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  UpdateProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-UpdateProfile-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: updateProfile.handler
      Events:
        UpdateProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: PUT
            Path: /profile
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  # Project Management Functions
  CreateProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-CreateProject-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: createProject.handler
      Events:
        CreateProject:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /projects
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  ListProjectsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-ListProjects-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: listProjects.handler
      Events:
        ListProjects:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /projects
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  GetProjectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetProject-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: getProject.handler
      Events:
        GetProject:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /projects/{projectId}
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  # AI Analysis Function
  AnalyzeRequirementsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-AnalyzeRequirements-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: analyzeRequirements.handler
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref ClarityBridgeUploads
      Events:
        AnalyzeRequirements:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /projects/{projectId}/analyze
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable
        - S3ReadPolicy:
            BucketName: !Ref ClarityBridgeUploads

  # Messaging Functions
  SendMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-SendMessage-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: sendMessage.handler
      Events:
        SendMessage:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /projects/{projectId}/messages
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  GetMessagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetMessages-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: getMessages.handler
      Events:
        GetMessages:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /projects/{projectId}/messages
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  # Proposal Functions
  SubmitProposalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-SubmitProposal-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: submitProposal.handler
      Events:
        SubmitProposal:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /proposals
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

  GetProposalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetProposals-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: getProposals.handler
      Events:
        GetProposals:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: GET
            Path: /proposals/{projectId}
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ClarityBridgeTable

  # File Upload Function (No Auth Required)
  GetPresignedUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-GetPresignedUploadUrl-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: getPresignedUploadUrl.handler
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref ClarityBridgeUploads
      Events:
        GetPresignedUploadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref ClarityBridgeApi
            Method: POST
            Path: /upload-url
            Auth:
              Authorizer: NONE
      Policies:
        - S3WritePolicy:
            BucketName: !Ref ClarityBridgeUploads

  # File Processing Function
  ProcessUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'ClarityBridge-ProcessUpload-${Environment}'
      CodeUri: ../backend/dist/handlers/
      Handler: processUpload.handler
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref ClarityBridgeUploads
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ClarityBridgeUploads
        - DynamoDBCrudPolicy:
            TableName: !Ref ClarityBridgeTable

Outputs:
  # API Gateway
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ClarityBridgeApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  # CloudFront
  CloudFrontUrl:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontUrl'

  # Cognito
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref ClarityBridgeUserPool
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref ClarityBridgeWebClient
    Export:
      Name: !Sub '${AWS::StackName}-UserPoolClientId'

  # DynamoDB
  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref ClarityBridgeTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'

  # S3
  UploadsBucketName:
    Description: S3 uploads bucket name
    Value: !Ref ClarityBridgeUploads
    Export:
      Name: !Sub '${AWS::StackName}-UploadsBucket'

  FrontendBucketName:
    Description: S3 frontend bucket name
    Value: !Ref ClarityBridgeFrontend
    Export:
      Name: !Sub '${AWS::StackName}-FrontendBucket'

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontDistributionId'